basePath: /api/v1
definitions:
  github_com_gsystes_backend_internal_communication_dto.AssignPermissionsRequest:
    properties:
      permission_ids:
        items:
          type: integer
        type: array
    required:
    - permission_ids
    type: object
  github_com_gsystes_backend_internal_communication_dto.BatchAssignRoleRequest:
    properties:
      role_id:
        type: integer
      user_ids:
        items:
          type: integer
        minItems: 1
        type: array
    required:
    - role_id
    - user_ids
    type: object
  github_com_gsystes_backend_internal_communication_dto.ChangePasswordRequest:
    properties:
      new_password:
        maxLength: 128
        minLength: 6
        type: string
      old_password:
        type: string
    required:
    - new_password
    - old_password
    type: object
  github_com_gsystes_backend_internal_communication_dto.CreatePermissionRequest:
    properties:
      code:
        maxLength: 64
        type: string
      method:
        maxLength: 32
        type: string
      name:
        maxLength: 64
        type: string
      parent_id:
        type: integer
      path:
        maxLength: 256
        type: string
      sort:
        type: integer
      type:
        enum:
        - 1
        - 2
        type: integer
    required:
    - code
    - name
    type: object
  github_com_gsystes_backend_internal_communication_dto.CreateRoleRequest:
    properties:
      code:
        maxLength: 64
        type: string
      description:
        maxLength: 256
        type: string
      name:
        maxLength: 64
        type: string
    required:
    - code
    - name
    type: object
  github_com_gsystes_backend_internal_communication_dto.CreateUserRequest:
    properties:
      email:
        type: string
      nickname:
        maxLength: 64
        type: string
      password:
        maxLength: 128
        minLength: 6
        type: string
      phone:
        type: string
      role_id:
        type: integer
      username:
        maxLength: 64
        minLength: 3
        type: string
    required:
    - password
    - role_id
    - username
    type: object
  github_com_gsystes_backend_internal_communication_dto.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  github_com_gsystes_backend_internal_communication_dto.UpdatePermissionRequest:
    properties:
      code:
        maxLength: 64
        type: string
      method:
        maxLength: 32
        type: string
      name:
        maxLength: 64
        type: string
      parent_id:
        type: integer
      path:
        maxLength: 256
        type: string
      sort:
        type: integer
      type:
        enum:
        - 1
        - 2
        type: integer
    required:
    - code
    - name
    type: object
  github_com_gsystes_backend_internal_communication_dto.UpdateRoleRequest:
    properties:
      code:
        maxLength: 64
        type: string
      description:
        maxLength: 256
        type: string
      name:
        maxLength: 64
        type: string
      status:
        enum:
        - 1
        - 2
        type: integer
    required:
    - code
    - name
    type: object
  github_com_gsystes_backend_internal_communication_dto.UpdateUserRequest:
    properties:
      email:
        type: string
      nickname:
        maxLength: 64
        type: string
      phone:
        type: string
      role_id:
        type: integer
      status:
        enum:
        - 1
        - 2
        type: integer
    type: object
  github_com_gsystes_backend_internal_infrastructure_utils.PageResponse:
    properties:
      list: {}
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
    type: object
  github_com_gsystes_backend_internal_infrastructure_utils.Response:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: 中后台管理系统后端 API
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Gsystes Backend API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: 使用用户名和密码登录，返回 JWT Token
      parameters:
      - description: 登录信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_gsystes_backend_internal_communication_dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_gsystes_backend_internal_infrastructure_utils.Response'
            - properties:
                data:
                  properties:
                    token:
                      type: string
                    user:
                      properties:
                        avatar:
                          type: string
                        id:
                          type: integer
                        nickname:
                          type: string
                        role_id:
                          type: integer
                        username:
                          type: string
                      type: object
                  type: object
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_gsystes_backend_internal_infrastructure_utils.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_gsystes_backend_internal_infrastructure_utils.Response'
      summary: 用户登录
      tags:
      - 认证
  /auth/menus:
    get:
      consumes:
      - application/json
      description: 返回当前用户角色拥有的菜单权限树形结构
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_gsystes_backend_internal_infrastructure_utils.Response'
      security:
      - BearerAuth: []
      summary: 获取当前用户菜单树
      tags:
      - 认证
  /auth/permissions:
    get:
      consumes:
      - application/json
      description: 返回当前用户角色拥有的所有权限标识列表（如 ["user:create", "role:delete"]）
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_gsystes_backend_internal_infrastructure_utils.Response'
            - properties:
                data:
                  items:
                    type: string
                  type: array
              type: object
      security:
      - BearerAuth: []
      summary: 获取当前用户权限标识
      tags:
      - 认证
  /logs:
    get:
      consumes:
      - application/json
      description: 分页查询操作日志
      parameters:
      - description: 页码（默认 1）
        in: query
        name: page
        type: integer
      - description: 每页条数（默认 10，最大 100）
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_gsystes_backend_internal_infrastructure_utils.PageResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_gsystes_backend_internal_infrastructure_utils.Response'
      security:
      - BearerAuth: []
      summary: 操作日志列表
      tags:
      - 操作日志
  /permissions:
    get:
      consumes:
      - application/json
      description: 分页查询权限列表
      parameters:
      - description: 页码（默认 1）
        in: query
        name: page
        type: integer
      - description: 每页条数（默认 10，最大 100）
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_gsystes_backend_internal_infrastructure_utils.PageResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_gsystes_backend_internal_infrastructure_utils.Response'
      security:
